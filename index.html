<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Blackjack</title>
        <link rel="stylesheet" type="text/css" href="blackjack.css"/>
    </head>
    <body id="page-wrapper">
        <div id="dealer-space">
            <div id="settings-wrapper">
                <button
                    class="action"
                    id="reset"
                    >RESET</button>
                <div id="shoe-counter-wrapper">
                    <p class="counter">SHOE:</p>
                    <p class="counter" id="shoe-counter">0</p>
                </div>
            </div>
            <div class="hand-wrapper" id="dealer-hand">
                <div class="dud-card"></div>
            </div>
            <div id="log-wrapper">
                <p id="log-header">
                    LOG
                </p>
                <div id="log"></div>
            </div>
        </div>
        <div id="player-space">
            <div class="player-hands">
                <div class="hand-wrapper" id="player-hand">
                    <div class="dud-card"></div>
                </div>
                <div class="split-hand-wrapper" id="split-hand"></div>
            </div>
            <div id="counters-controls-wrapper">
                <div id="counters-wrapper">
                    <div class="counter">
                        <p class="counter-value" id="player-chips">0</p>
                        <p class="counter-caption">PLAYER CHIPS</p>
                    </div>
                    <div class="counter">
                        <p class="counter-value" id="pot">0</p>
                        <p class="counter-caption">POT</p>
                    </div>
                    <div class="counter" id="split-pot-wrapper">
                        <p class="counter-value" id="split-pot">0</p>
                        <p class="counter-caption">SPLIT POT</p>
                    </div>
                </div>
                <div id="controls">
                    <div id="chip-button-wrapper">
                        <button
                            class="chip"
                            id="chip-1">1</button>
                        <button
                            class="chip"
                            id="chip-5">5</button>
                        <button
                            class="chip"
                            id="chip-25">25</button>
                        <button
                            class="chip"
                            id="chip-100">100</button>
                        <button
                            class="chip"
                            id="chip-500">500</button>
                    </div>
                    <div id="stacked-button-wrapper">
                        <button
                            class="action"
                            id="all-in">ALL IN</button>
                        <button
                            class="action"
                            id="deal"
                            onclick="player.deal()">BET</button>
                    </div>
                    <div id="player-actions">
                        <button
                            class="action"
                            id="hit"
                            onclick="player.action(player.hit())">HIT</button>
                        <button
                            class="action"
                            id="stand"
                            onclick="player.action(player.currentHand.stand())">STAND</button>
                        <button
                            class="action"
                            id="double-down"
                            onclick="player.action(player.doubleDown())">DOUBLE DOWN</button>
                        <button
                            class="action"
                            id="split"
                            onclick="player.action(player.split())">SPLIT</button>
                        <button
                            class="action"
                            id="fold"
                            onclick="player.action(player.fold())">FOLD</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="win-popup">
            <div class="light" id="top-light-1"></div>
            <div class="light" id="top-light-2"></div>
            <div class="light" id="top-light-3"></div>
            <div class="light" id="top-light-4"></div>
            <div class="light" id="left-light-1"></div>
            <div class="light" id="left-light-2"></div>
            <div class="light" id="left-light-3"></div>
            <div id="win-message">
                <span id="winner">PLAYER WIN!</span>
                <span>PLAY AGAIN?</span>
                <div id="play-again-buttons">
                    <button
                        class="action"
                        id="play-again"
                        onclick="playAgain()"
                        >YES</button>
                    <button
                        class="action"
                        id="cashout"
                        onclick="cashout()">NO (CASHOUT)</button>
                </div>
            </div>
            <div class="light" id="right-light-1"></div>
            <div class="light" id="right-light-2"></div>
            <div class="light" id="right-light-3"></div>
            <div class="light" id="bottom-light-1"></div>
            <div class="light" id="bottom-light-2"></div>
            <div class="light" id="bottom-light-3"></div>
            <div class="light" id="bottom-light-4"></div>
        </div>
    </body>
    <script src="blackjack.js"></script>
</html>
