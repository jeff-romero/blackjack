<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Blackjack</title>
        <link rel="stylesheet" type="text/css" href="blackjack.css"/>
    </head>
    <body id="page-wrapper">
        <div id="dealer-space">
            <div class="hand-wrapper" id="dealer-hand">
            </div>
        </div>
        <div id="player-space">
            <div class="hand-wrapper" id="player-hand">
            </div>
            <div id="counters">
                <div class="counter">
                    <p class="counter-value" id="player-chips">0</p>
                    <p class="counter-caption">PLAYER CHIPS</p>
                </div>
                <div class="counter">
                    <p class="counter-value" id="pot">0</p>
                    <p class="counter-caption">POT</p>
                </div>
            </div>
            <div id="controls">
                <div class="chip-button-wrapper">
                    <button
                        class="chip"
                        id="chip-1">1</button>
                    <button
                        class="chip"
                        id="chip-5">5</button>
                    <button
                        class="chip"
                        id="chip-25">25</button>
                    <button
                        class="chip"
                        id="chip-100">100</button>
                    <button
                        class="chip"
                        id="chip-500">500</button>
                </div>
                <div class="player-actions">
                    <button
                        class="action"
                        id="hit"
                        onclick="player.action(player.hit())">HIT</button>
                    <button
                        class="action"
                        id="stand"
                        onclick="">STAND</button>
                    <button
                        class="action"
                        id="double-down"
                        onclick="player.action(player.doubleDown())">DOUBLE DOWN</button>
                    <button
                        class="action"
                        id="split"
                        onclick="">SPLIT</button>
                    <button
                        class="action"
                        id="fold"
                        onclick="">FOLD</button>
                </div>
                <div class="stacked-button-wrapper">
                    <button
                        class="action"
                        id="all-in"
                        onclick="">ALL IN</button>
                    <button
                        class="action"
                        id="deal"
                        onclick="player.action(player.deal())">DEAL</button>
                </div>
            </div>
        </div>
    </body>
    <script src="blackjack.js"></script>
</html>
